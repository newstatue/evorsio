services:
  postgres:
    image: postgres:17
    container_name: evorsio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evorsio
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: evorsio-cache
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data: