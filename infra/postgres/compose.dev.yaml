services:
  postgres:
    image: postgres:17
    container_name: evorsio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evorsio
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: secret
    networks:
      - evorsio-dev
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
networks:
  evorsio-dev:
    external: true